<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Multilingual RAG Architecture</title>
  <desc>Multi-service architecture: Streamlit frontend, FastAPI backend with JWT auth, PostgreSQL for users and query logs, ChromaDB for vectors, Gemini 2.5 Flash for grounded generation.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font-size: 14px; fill: #2C2C2A; }
      .ts { font-size: 12px; fill: #5F5E5A; }
      .th { font-size: 14px; font-weight: 500; }
      .arr { stroke: #888780; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <!-- User -->
  <rect x="290" y="20" width="100" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">User</text>

  <!-- Arrow user → frontend -->
  <line x1="340" y1="60" x2="340" y2="98" class="arr" marker-end="url(#arrow)"/>

  <!-- Streamlit frontend -->
  <rect x="220" y="98" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Streamlit frontend</text>
  <text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Login, upload, query UI</text>

  <!-- HTTP+JWT label and arrow -->
  <text class="ts" x="355" y="180" text-anchor="start" fill="#5F5E5A">HTTP + JWT</text>
  <line x1="340" y1="154" x2="340" y2="206" class="arr" marker-end="url(#arrow)"/>

  <!-- FastAPI backend -->
  <rect x="170" y="206" width="340" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="226" text-anchor="middle" dominant-baseline="central" fill="#0C447C">FastAPI backend</text>
  <text class="ts" x="340" y="246" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Auth, retrieval, generation</text>
  <text class="ts" x="340" y="266" text-anchor="middle" dominant-baseline="central" fill="#185FA5">/register /login /upload /ask /history</text>

  <!-- Three arrows fan out -->
  <line x1="240" y1="286" x2="140" y2="332" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="286" x2="340" y2="332" class="arr" marker-end="url(#arrow)"/>
  <line x1="440" y1="286" x2="540" y2="332" class="arr" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="50" y="332" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="140" y="352" text-anchor="middle" dominant-baseline="central" fill="#085041">PostgreSQL</text>
  <text class="ts" x="140" y="372" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Users, query logs</text>

  <!-- ChromaDB -->
  <rect x="250" y="332" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="352" text-anchor="middle" dominant-baseline="central" fill="#085041">ChromaDB</text>
  <text class="ts" x="340" y="372" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Vector embeddings</text>

  <!-- Gemini -->
  <rect x="450" y="332" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="540" y="352" text-anchor="middle" dominant-baseline="central" fill="#633806">Gemini 2.5 Flash</text>
  <text class="ts" x="540" y="372" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Grounded answer</text>

  <!-- Footer note -->
  <text class="ts" x="340" y="418" text-anchor="middle" fill="#5F5E5A">Embeddings: paraphrase-multilingual-MiniLM-L12-v2 (50+ languages including Hindi)</text>
</svg>
